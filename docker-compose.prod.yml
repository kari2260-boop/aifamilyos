# 生产环境 Docker Compose 配置
# 用法: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: aifamily
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 生产环境不暴露端口到外部
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/aifamily
    env_file:
      - .env.production
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    # 仅绑定本机端口，由宿主机 nginx 反代

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    # 仅绑定本机端口，由宿主机 nginx 反代

volumes:
  pgdata:
