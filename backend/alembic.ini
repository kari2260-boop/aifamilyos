[alembic]
script_location = alembic
prepend_sys_path = .
timezone = UTC

# The real database URL is loaded from app.config Settings / environment.
# This placeholder keeps Alembic happy for commands that inspect config.
sqlalchemy.url = postgresql://postgres:postgres@db:5432/aifamily

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
